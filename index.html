<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Nouns - Interactive Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .logo-wrap {
      width: 92vw;
      max-width: 1500px;
      position: relative;
    }
    .logo-wrap > svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .angle-label {
      position: absolute;
      font-size: clamp(12px, 1.2vw, 19.5px);
      font-weight: 300;
      color: #1f33b9;
      background: #fff;
      padding: 2px 4px 2px 6px;
      border: 1px solid #1f33b9;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      white-space: nowrap;
      font-family: 'Azeret Mono', monospace;
      transform: translate(-50%, -50%);
    }
    .angle-label.resting { opacity: 0; }
    .angle-label.visible { opacity: 1; }
    /* S invite stroke draw animation */
    @keyframes s-draw-stroke {
      from { stroke-dashoffset: var(--path-length); }
      to   { stroke-dashoffset: 0; }
    }
  </style>
</head>

  <script>
    const mainSvg = document.getElementById('mainSvg');
    const logoWrap = document.getElementById('logoWrap');

    function svgToPercent(svgX, svgY) {
      const vb = mainSvg.viewBox.baseVal;
      return {
        x: ((svgX - vb.x) / vb.width) * 100,
        y: ((svgY - vb.y) / vb.height) * 100
      };
    }

    function pageToSvg(px, py) {
      const rect = mainSvg.getBoundingClientRect();
      const vb = mainSvg.viewBox.baseVal;
      const svgAspect = vb.width / vb.height;
      const boxAspect = rect.width / rect.height;
      let renderW, renderH, offsetX, offsetY;
      if (boxAspect > svgAspect) {
        renderH = rect.height; renderW = rect.height * svgAspect;
        offsetX = (rect.width - renderW) / 2; offsetY = 0;
      } else {
        renderW = rect.width; renderH = rect.width / svgAspect;
        offsetX = 0; offsetY = (rect.height - renderH) / 2;
      }
      return {
        x: vb.x + ((px - rect.left - offsetX) / renderW) * vb.width,
        y: vb.y + ((py - rect.top - offsetY) / renderH) * vb.height
      };
    }

    // ===== Angle labels =====
    const labelPositions = [
      { id: 'al1', x: 357, y: 668 },
      { id: 'al2', x: 449, y: 378 },

    ];
    function positionLabels() {
      labelPositions.forEach(lp => {
        const el = document.getElementById(lp.id);
        const p = svgToPercent(lp.x, lp.y);
        el.style.left = p.x + '%';
        el.style.top = p.y + '%';
      });
    }
    positionLabels();
    window.addEventListener('resize', positionLabels);

    // ===== Letter regions =====
    function getRegion(sx, sy) {
      if (sx >= 229 && sx <= 579 && sy >= 340 && sy <= 710) return 'N';
      if (sx >= 569 && sx <= 854 && sy >= 410 && sy <= 720) return 'O';
      if (sx >= 854 && sx <= 1150 && sy >= 410 && sy <= 720) return 'U';
      if (sx >= 1150 && sx <= 1449 && sy >= 410 && sy <= 720) return 'n';
      if (sx >= 1449 && sx <= 1700 && sy >= 370 && sy <= 720) return 'S';
      return null;
    }

    // ===== O Pixels =====
    const oPixels = document.getElementById('o-pixels');
    const pxSize = 14;
    const oPixelData = [];
    const oCx = 710.34, oCy = 566.19;

    for (let x = 569; x <= 854; x += pxSize) {
      for (let y = 420; y <= 710; y += pxSize) {
        const dx = x - oCx, dy = y - oCy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const inHole = (dx * dx) / (68 * 68) + (dy * dy) / (80 * 80) < 1;
        if (!inHole && dist < 145) {
          const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          r.setAttribute('x', x); r.setAttribute('y', y);
          r.setAttribute('width', pxSize); r.setAttribute('height', pxSize);
          const isWhite = Math.random() < 0.15;
          r.setAttribute('fill', isWhite ? 'white' : '#1f33b9');
          r.setAttribute('stroke', 'white'); r.setAttribute('stroke-width', '1.5');
          r.setAttribute('opacity', '0');
          oPixels.appendChild(r);
          oPixelData.push({ el: r, px: x + pxSize / 2, py: y + pxSize / 2 });
        }
      }
    }

    const O_REST_X = 765, O_REST_Y = 472, O_RADIUS = 75;
    let lastOX = O_REST_X, lastOY = O_REST_Y;

    const strayPixels = oPixelData
      .filter(p => {
        const dx = p.px - O_REST_X, dy = p.py - O_REST_Y;
        const d = Math.sqrt(dx * dx + dy * dy);
        return d >= O_RADIUS + 2 && d < O_RADIUS + 55;
      })
      .sort(() => Math.random() - 0.5)
      .slice(0, 9);
    const straySet = new Set(strayPixels.map(p => p.el));

    let oHovering = false;
    let oJitterInterval = null;

    function applyOPixels(spotX, spotY) {
      oPixelData.forEach(p => {
        const dx = p.px - spotX, dy = p.py - spotY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < O_RADIUS) {
          p.el.setAttribute('opacity', '1');
          // Main blob stays on grid
          p.el.setAttribute('x', p.px - pxSize/2);
          p.el.setAttribute('y', p.py - pxSize/2);
        } else if (straySet.has(p.el)) {
          // Force stray pixels to always be blue (never white on top of blob)
          p.el.setAttribute('fill', '#1f33b9');
          if (oHovering) {
            // Wander around the O ring but never overlap main blob
            let wx, wy, attempts = 0;
            do {
              const angle = Math.random() * Math.PI * 2;
              const minR = O_RADIUS + 10, maxR = 160;
              const r = minR + Math.random() * (maxR - minR);
              wx = oCx + Math.cos(angle) * r;
              wy = oCy + Math.sin(angle) * r;
              const ddx = wx - spotX, ddy = wy - spotY;
              if (Math.sqrt(ddx*ddx + ddy*ddy) > O_RADIUS + pxSize) break;
              attempts++;
            } while (attempts < 5);
            p.el.setAttribute('x', (wx - pxSize/2).toFixed(1));
            p.el.setAttribute('y', (wy - pxSize/2).toFixed(1));
            p.el.setAttribute('opacity', '1');
          } else {
            p.el.setAttribute('opacity', '1');
          }
        } else {
          p.el.setAttribute('opacity', '0');
        }
      });
    }

    function resetOPixelPositions() {
      oPixelData.forEach(p => {
        p.el.setAttribute('x', p.px - pxSize/2);
        p.el.setAttribute('y', p.py - pxSize/2);
      });
    }

    function startOJitter() {
      oHovering = true;
      if (oJitterInterval) return;
      oJitterInterval = setInterval(() => {
        applyOPixels(lastOX, lastOY);
      }, 180);
    }

    function stopOJitter() {
      oHovering = false;
      clearInterval(oJitterInterval); oJitterInterval = null;
      resetOPixelPositions();
    }

    applyOPixels(O_REST_X, O_REST_Y);

    // O sprinkle pixels — near cursor only
    const sprinklePixels = [];
    const sprinkleSeeds = [
      [oCx+155, oCy-60], [oCx+140, oCy+80], [oCx-160, oCy-40],
      [oCx-145, oCy+90], [oCx+30,  oCy-165],[oCx-50,  oCy+160],
      [oCx+110, oCy-135],[oCx-120, oCy-120],[oCx+165, oCy+20],
      [oCx-170, oCy+30], [oCx+60,  oCy+170],[oCx-80,  oCy-158],
      [oCx+140, oCy-100],[oCx-130, oCy+110],[oCx+20,  oCy-180],
    ];
    sprinkleSeeds.forEach(([sx, sy]) => {
      const r = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      const size = 10 + Math.random() * 6;
      r.setAttribute('x', sx - size/2); r.setAttribute('y', sy - size/2);
      r.setAttribute('width', size); r.setAttribute('height', size);
      r.setAttribute('fill', '#1f33b9');
      r.setAttribute('stroke', 'white'); r.setAttribute('stroke-width', '1.5');
      r.setAttribute('opacity', '0');
      oPixels.appendChild(r);
      sprinklePixels.push({ el: r, x: sx, y: sy });
    });

    let sprinkleInterval = null, sprinkleHoverX = oCx, sprinkleHoverY = oCy;
    function startSprinkles() {
      if (sprinkleInterval) return;
      sprinkleInterval = setInterval(() => {
        sprinklePixels.forEach(p => {
          const dx = p.x - sprinkleHoverX, dy = p.y - sprinkleHoverY;
          if (Math.sqrt(dx*dx+dy*dy) < 105) {
            const show = Math.random() < 0.45;
            p.el.setAttribute('opacity', show ? '1' : '0');
          } else {
            p.el.setAttribute('opacity', '0');
          }
        });
      }, 220);
    }
    function stopSprinkles() {
      clearInterval(sprinkleInterval); sprinkleInterval = null;
      sprinklePixels.forEach(p => p.el.setAttribute('opacity', '0'));
    }

    // White sparkle overlay removed — white pixels are part of main grid now

    // ===== U BEZIER EDITOR =====

    // Control points extracted from the real plain-SVG U path (all segments)
    const uPts = {

      cpExitL:   { x: 1067.82, y: 688.56 },  // exit cp1

    // Full parametric path from all control points
    function buildUPath() {

      return [
        `M${p.innerBR.x},${p.innerBR.y}`,
        `C${p.cpInnerR.x},${p.cpInnerR.y} ${p.cpInnerL.x},${p.cpInnerL.y} ${p.innerBL.x},${p.innerBL.y}`,
        `L${p.innerTL.x},${p.innerTL.y}`,
        `L${p.outerTL.x},${p.outerTL.y}`,
        `L${p.outerNotch.x},${p.outerNotch.y}`,
        `C${p.cpSerifL.x},${p.cpSerifL.y} ${p.cpSerifR.x},${p.cpSerifR.y} ${p.serifEnd.x},${p.serifEnd.y}`,
        `L${p.outerBL.x},${p.outerBL.y}`,
        `C${p.cpOuterL.x},${p.cpOuterL.y} ${p.cpOuterR.x},${p.cpOuterR.y} ${p.outerBM.x},${p.outerBM.y}`,

        `L${p.outerTR.x},${p.outerTR.y}`,

      { key: 'serifEnd',  type: 'anchor' },
      { key: 'outerBL',   type: 'anchor' },
      { key: 'cpOuterL',  type: 'handle', anchor: 'outerBL' },
      { key: 'cpOuterR',  type: 'handle', anchor: 'outerBM' },
      { key: 'outerBM',   type: 'anchor' },
      { key: 'cpExitL',   type: 'handle', anchor: 'outerBM' },
      { key: 'cpExitR',   type: 'handle', anchor: 'outerExit' },
      { key: 'outerExit', type: 'anchor' },
      { key: 'cpDiagL',   type: 'handle', anchor: 'outerExit' },
      { key: 'cpDiagR',   type: 'handle', anchor: 'diagEnd' },
      { key: 'diagEnd',   type: 'anchor' },
      { key: 'cpStemL',   type: 'handle', anchor: 'diagEnd' },
      { key: 'cpStemR',   type: 'handle', anchor: 'outerStem' },
      { key: 'outerStem', type: 'anchor' },
      { key: 'outerTR',   type: 'anchor' },
      { key: 'innerTR',   type: 'anchor' },
    ];

    const uHandleEls = {}, uLineEls = {};

    uHandleDefs.filter(h => h.type === 'handle').forEach(h => {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('stroke', '#1f33b9'); line.setAttribute('stroke-width', '3.5');
      line.setAttribute('stroke-dasharray', '6 4'); line.setAttribute('opacity', '0.55');
      uEditor.appendChild(line);
      uLineEls[h.key] = line;
    });

    uHandleDefs.forEach(h => {
      let el;
      if (h.type === 'anchor') {
        el = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        el.setAttribute('width','13.5'); el.setAttribute('height','13.5');
        el.setAttribute('fill','white');
        el.setAttribute('stroke','#1f33b9'); el.setAttribute('stroke-width','1.5');
      } else {
        el = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        el.setAttribute('r','7.5'); el.setAttribute('fill','#1f33b9');
        el.setAttribute('stroke','white'); el.setAttribute('stroke-width','1.5');
      }
      el.style.cursor = 'move';
      uEditor.appendChild(el);
      uHandleEls[h.key] = el;

      el.addEventListener('mousedown', (e) => {
        e.stopPropagation();
        // Switch to parametric path on first drag
        if (!uEditStarted) {
          uEditStarted = true;
          uPathEl.setAttribute('d', buildUPath());
        }
        uDragging = h.key;
        document.body.style.cursor = 'move';
      });
    });

    const uOutline = document.getElementById('u-outline');

    function updateUHandles() {
      uHandleDefs.forEach(h => {
        const pt = uPts[h.key];
        const el = uHandleEls[h.key];
        if (h.type === 'anchor') {
          el.setAttribute('x', pt.x - 6.75); el.setAttribute('y', pt.y - 6.75);
        } else {
          el.setAttribute('cx', pt.x); el.setAttribute('cy', pt.y);
          if (h.anchor && uPts[h.anchor]) {
            const ap = uPts[h.anchor];
            const line = uLineEls[h.key];
            line.setAttribute('x1', ap.x); line.setAttribute('y1', ap.y);
            line.setAttribute('x2', pt.x); line.setAttribute('y2', pt.y);
            // Color based on background: white on blue, blue on white
            const midX = (ap.x + pt.x) / 2, midY = (ap.y + pt.y) / 2;
            const testPt = mainSvg.createSVGPoint();
            testPt.x = midX; testPt.y = midY;
            const onBlue = uPathEl.isPointInFill(testPt);
            line.setAttribute('stroke', onBlue ? 'white' : '#1f33b9');
          }
        }
      });
      // Only show outline once user starts editing
      if (uEditStarted) uOutline.setAttribute('d', buildUPath());
    }
    updateUHandles();

    document.addEventListener('mousemove', (e) => {
      if (!uDragging) return;
      const s = pageToSvg(e.clientX, e.clientY);
      // Clamp to viewBox bounds with a small margin
      const vb = mainSvg.viewBox.baseVal;
      const margin = 10;
      uPts[uDragging].x = Math.max(vb.x + margin, Math.min(vb.x + vb.width - margin, s.x));
      uPts[uDragging].y = Math.max(vb.y + margin, Math.min(vb.y + vb.height - margin, s.y));
      uPathEl.setAttribute('d', buildUPath());
      updateUHandles();
    });

    document.addEventListener('mouseup', () => {
      if (uDragging) {
        uDragging = null;
        document.body.style.cursor = '';
        if (region !== 'U') uEditor.setAttribute('opacity', '1');
      }
    });

    // ===== n width =====
    const letterLn = document.getElementById('letterLn');
    const nWidthAnnotations = document.getElementById('n-width-annotations');
    const nWidthLabel = document.getElementById('n-width-label');
    const nLeftLine = document.getElementById('n-left-line');
    const nRightLine = document.getElementById('n-right-line');
    const nDimLine = document.getElementById('n-dim-line');
    const nDimArrowL = document.getElementById('n-dim-arrow-l');
    const nDimArrowL2 = document.getElementById('n-dim-arrow-l2');
    const nDimArrowR = document.getElementById('n-dim-arrow-r');
    const nDimArrowR2 = document.getElementById('n-dim-arrow-r2');

    // ===== S INVITE STROKE ANIMATION =====
    (function initSInviteStroke() {
      const strokePath = document.getElementById('s-invite-stroke');
      if (!strokePath) return;
      const len = strokePath.getTotalLength();
      strokePath.style.setProperty('--path-length', len);
      strokePath.style.strokeDasharray = len;
      strokePath.style.strokeDashoffset = len;
      // Start the draw animation after a short delay
      setTimeout(() => {
        strokePath.style.animation = 's-draw-stroke 5s ease-in-out forwards';
      }, 800);
    })();

    // ===== S BRUSH PAINTING =====
    const sPaintGroup = document.getElementById('s-paint');
    const sHitEl = document.getElementById('s-hit');

    let sLastPaintX = null, sLastPaintY = null;
    const sBrushSpacing = 6;

    function isInS(svgX, svgY) {
      try {
        const pt = mainSvg.createSVGPoint();
        pt.x = svgX; pt.y = svgY;
        return sHitEl.isPointInFill(pt);
      } catch(e) { return false; }
    }

    function addBrushStroke(x1, y1, x2, y2) {
      const stroke = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const mx = (x1 + x2) / 2 + (Math.random() - 0.5) * 3;
      const my = (y1 + y2) / 2 + (Math.random() - 0.5) * 3;
      stroke.setAttribute('d', `M${x1},${y1} Q${mx},${my} ${x2},${y2}`);
      stroke.setAttribute('fill', 'none');
      stroke.setAttribute('stroke', '#1f33b9');
      const sw = 22 + Math.random() * 12;
      stroke.setAttribute('stroke-width', sw);
      stroke.setAttribute('stroke-linecap', 'round');
      stroke.setAttribute('opacity', String(0.75 + Math.random() * 0.2));
      sPaintGroup.appendChild(stroke);
      for (let i = 0; i < 3; i++) {
        const ts = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const off = (Math.random() - 0.5) * sw * 0.6;
        const dx = x2 - x1, dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        const nx = -dy/len, ny = dx/len;
        const tx1 = x1 + nx*off, ty1 = y1 + ny*off;
        const tx2 = x2 + nx*off + (Math.random()-0.5)*4, ty2 = y2 + ny*off + (Math.random()-0.5)*4;
        const tmx = (tx1+tx2)/2 + (Math.random()-0.5)*2, tmy = (ty1+ty2)/2 + (Math.random()-0.5)*2;
        ts.setAttribute('d', `M${tx1.toFixed(1)},${ty1.toFixed(1)} Q${tmx.toFixed(1)},${tmy.toFixed(1)} ${tx2.toFixed(1)},${ty2.toFixed(1)}`);
        ts.setAttribute('fill', 'none');
        ts.setAttribute('stroke', '#1f33b9');
        ts.setAttribute('stroke-width', (0.5 + Math.random()*1.5).toFixed(1));
        ts.setAttribute('stroke-linecap', 'round');
        ts.setAttribute('opacity', (0.3 + Math.random()*0.3).toFixed(2));
        sPaintGroup.appendChild(ts);
      }
    }

    function paintSAt(svgX, svgY) {
      if (!isInS(svgX, svgY)) { sLastPaintX = null; sLastPaintY = null; return; }
      if (sLastPaintX === null) {
        sLastPaintX = svgX; sLastPaintY = svgY; return;
      }
      const dx = svgX - sLastPaintX, dy = svgY - sLastPaintY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist >= sBrushSpacing) {
        addBrushStroke(sLastPaintX, sLastPaintY, svgX, svgY);
        sLastPaintX = svgX; sLastPaintY = svgY;
      }
    }

    // ===== Main interaction =====
    let region = null;

    // Individual marker hover → show label near cursor
    let activeMarkerLabel = null;
    document.querySelectorAll('.n-marker').forEach(marker => {
      marker.addEventListener('mouseenter', (e) => {
        const labelId = marker.getAttribute('data-label');
        if (labelId) {
          activeMarkerLabel = document.getElementById(labelId);
          activeMarkerLabel.classList.remove('resting'); activeMarkerLabel.classList.add('visible');
          // Position near cursor
          const wrap = document.getElementById('logoWrap');
          const rect = wrap.getBoundingClientRect();
          activeMarkerLabel.style.left = ((e.clientX - rect.left + 16) / rect.width * 100) + '%';
          activeMarkerLabel.style.top = ((e.clientY - rect.top - 12) / rect.height * 100) + '%';
        }
      });
      marker.addEventListener('mousemove', (e) => {
        if (activeMarkerLabel) {
          const wrap = document.getElementById('logoWrap');
          const rect = wrap.getBoundingClientRect();
          activeMarkerLabel.style.left = ((e.clientX - rect.left + 16) / rect.width * 100) + '%';
          activeMarkerLabel.style.top = ((e.clientY - rect.top - 12) / rect.height * 100) + '%';
        }
      });
      marker.addEventListener('mouseleave', () => {
        if (activeMarkerLabel) {
          activeMarkerLabel.classList.remove('visible'); activeMarkerLabel.classList.add('resting');
          activeMarkerLabel = null;
        }
      });
    });

    function enterRegion(r) {
      if (r === 'N') {
        // markers handle their own labels individually now
      }
      if (r === 'O') { startSprinkles(); startOJitter(); }
      if (r === 'U') { uEditor.setAttribute('opacity', '1'); uEditor.style.transition = 'opacity 0.2s ease'; }
      if (r === 'n') { nWidthAnnotations.setAttribute('opacity', '1'); }
      if (r === 'S') {
        sLastPaintX = null; sLastPaintY = null;
      }
    }

    function leaveRegion(r) {
      if (r === 'N') {
        // hide all labels when leaving the N region entirely
        labelPositions.forEach(lp => {
          const el = document.getElementById(lp.id);
          el.classList.remove('visible'); el.classList.add('resting');
        });
      }
      if (r === 'O') {
        stopSprinkles(); stopOJitter();
        applyOPixels(lastOX, lastOY);
      }
      if (r === 'U') {
        if (!uDragging) uEditor.setAttribute('opacity', '1');
      }
      if (r === 'n') {
        letterLn.removeAttribute('transform');
        nWidthAnnotations.setAttribute('opacity', '0');
      }
      if (r === 'S') {
        sLastPaintX = null; sLastPaintY = null;
      }
    }

    logoWrap.addEventListener('mousemove', (e) => {
      const s = pageToSvg(e.clientX, e.clientY);
      const r = getRegion(s.x, s.y);

      if (r !== region) {
        if (region) leaveRegion(region);
        region = r;
        if (r) enterRegion(r);
      }

      if (r === 'O') {
        sprinkleHoverX = s.x; sprinkleHoverY = s.y;
        lastOX = s.x; lastOY = s.y;
        applyOPixels(s.x, s.y);
      }

      if (r === 'n') {
        const t = Math.max(0, Math.min(1, (s.x - 1150) / 299));
        const cx = 1296;
        const scaleX = 0.35 + t * 1.3;
        letterLn.setAttribute('transform', `translate(${cx*(1-scaleX)},0) scale(${scaleX},1)`);
        nWidthAnnotations.setAttribute('opacity', '1');
        const baseW = 280, newW = baseW * scaleX;
        const newLeft = cx - newW/2, newRight = cx + newW/2;
        nLeftLine.setAttribute('x1',newLeft); nLeftLine.setAttribute('x2',newLeft);
        nRightLine.setAttribute('x1',newRight); nRightLine.setAttribute('x2',newRight);
        nDimLine.setAttribute('x1',newLeft); nDimLine.setAttribute('x2',newRight);
        nDimArrowL.setAttribute('x1',newLeft); nDimArrowL.setAttribute('x2',newLeft+8);
        nDimArrowL2.setAttribute('x1',newLeft); nDimArrowL2.setAttribute('x2',newLeft+8);
        nDimArrowR.setAttribute('x1',newRight); nDimArrowR.setAttribute('x2',newRight-8);
        nDimArrowR2.setAttribute('x1',newRight); nDimArrowR2.setAttribute('x2',newRight-8);
        nWidthLabel.setAttribute('x', cx);
        nWidthLabel.textContent = Math.round(scaleX*100)+'%';
      }

      if (r === 'S') {
        paintSAt(s.x, s.y);
      }
    });

    logoWrap.addEventListener('mouseleave', () => {
      if (region) leaveRegion(region);
      region = null;
    });
  </script>
</body>
</html>
